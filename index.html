<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OverPair Support</title>
  <style>
    :root {
      --bg: #1c1c1e;
      --card: #111214;
      --text: #f5f5f7;
      --muted: #b0b3b8;
      --accent: #b8743c;
      --border: rgba(255,255,255,0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .eyebrow {
      display: inline-block;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 18px;
      font-size: 1.05rem;
      line-height: 1.65;
      color: var(--muted);
    }

    .support-box {
      margin-top: 28px;
      padding: 18px 20px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
    }

    .label {
      display: block;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    a {
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      color: var(--accent);
    }

    .footer {
      margin-top: 28px;
      font-size: 0.95rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="eyebrow">Support</span>
    <h1>OverPair Support</h1>
    <p>
      Need help with OverPair, want to report a bug, or have a feature request?
      Reach out and I’ll do my best to help.
    </p>

    <div class="support-box">
      <span class="label">Contact</span>
      <a href="mailto:substellar@me.com">substellar@me.com</a>
    </div>

    <p class="footer">Created by Marv Velandino</p>
  </main>
</body>
</html>
